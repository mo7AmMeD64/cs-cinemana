name: Build Extensions

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extensions
        run: ./gradlew make

      - name: Prepare repo folder
        run: |
          mkdir -p repo
          cp ShabakatyCinemana/build/ShabakatyCinemana.cs3 repo/
          FILE_SIZE=$(wc -c < ShabakatyCinemana/build/ShabakatyCinemana.cs3)
          python3 -c "
          import json

          # plugins.json
          plugins = [{
            'iconUrl': 'https://cinemana.shabakaty.com/img/icone.png',
            'apiVersion': 1,
            'repositoryUrl': 'https://github.com/mo7AmMeD64/cs-cinemana',
            'fileSize': $FILE_SIZE,
            'status': 1,
            'language': 'ar',
            'authors': ['mo7AmMeD64'],
            'tvTypes': ['Movie', 'TvSeries', 'Anime'],
            'version': 1,
            'internalName': 'ShabakatyCinemana',
            'url': 'https://raw.githubusercontent.com/mo7AmMeD64/cs-cinemana/main/repo/ShabakatyCinemana.cs3',
            'name': 'Shabakaty Cinemana'
          }]
          open('repo/plugins.json','w').write(json.dumps(plugins, indent=2))

          # repo.json
          repo = {
            'name': 'Shabakaty Cinemana Repo',
            'description': 'Arabic CloudStream extensions by mo7AmMeD64',
            'manifestVersion': 1,
            'pluginLists': ['https://raw.githubusercontent.com/mo7AmMeD64/cs-cinemana/main/repo/plugins.json']
          }
          open('repo/repo.json','w').write(json.dumps(repo, indent=2))
          "

      - name: Commit repo to main branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/
          git commit -m "Build: $(date +'%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} main
