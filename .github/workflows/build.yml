name: Build Extensions

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extensions
        run: ./gradlew make

      - name: Prepare repo folder
        run: |
          mkdir -p repo/apk
          cp ShabakatyCinemana/build/ShabakatyCinemana.cs3 repo/apk/
          python3 -c "
          import json
          index = [{'name':'Shabakaty Cinemana','pkg':'com.cinemana','apk':'apk/ShabakatyCinemana.cs3','lang':'ar','code':1,'version':'1.0','nsfw':0,'iconUrl':'https://cinemana.shabakaty.cc/img/icone.png','description':'Shabakaty Cinemana','authors':['mo7AmMeD64'],'repositoryUrl':'https://github.com/mo7AmMeD64/cs-cinemana','status':1,'tvTypes':['Movie','TvSeries','Anime']}]
          open('repo/index.min.json','w').write(json.dumps(index))
          "

      - name: Push to repo branch
        run: |
          cd repo
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b repo
          git add .
          git commit -m "Build: $(date +'%Y-%m-%d %H:%M')"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo
