name: Build Extensions

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extensions
        run: ./gradlew make

      - name: Prepare repo folder
        run: |
          mkdir -p repo
          CS3_URL="https://github.com/mo7AmMeD64/cs-cinemana/raw/refs/heads/repo/apk/ShabakatyCinemana.cs3"
          FILE_SIZE=$(wc -c < ShabakatyCinemana/build/ShabakatyCinemana.cs3)
          mkdir -p repo/apk
          cp ShabakatyCinemana/build/ShabakatyCinemana.cs3 repo/apk/
          python3 -c "
          import json
          index = [{
            'iconUrl': 'https://cinemana.shabakaty.com/img/icone.png',
            'apiVersion': 1,
            'repositoryUrl': 'https://github.com/mo7AmMeD64/cs-cinemana',
            'fileSize': $FILE_SIZE,
            'status': 1,
            'language': 'ar',
            'authors': ['mo7AmMeD64'],
            'tvTypes': ['Movie', 'TvSeries', 'Anime'],
            'version': 1,
            'internalName': 'ShabakatyCinemana',
            'url': '$CS3_URL',
            'name': 'Shabakaty Cinemana'
          }]
          open('repo/index.min.json','w').write(json.dumps(index, indent=2))
          "
          cat repo/index.min.json

      - name: Push to repo branch
        run: |
          cd repo
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b repo
          git add .
          git commit -m "Build: $(date +'%Y-%m-%d %H:%M')"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo
