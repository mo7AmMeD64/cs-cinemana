name: Build Extensions

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extensions
        run: ./gradlew make

      - name: Find build output
        run: find . -name "*.cs3" -o -name "index.min.json" 2>/dev/null | head -20

      - name: Push to repo branch
        run: |
          REPO_DIR=$(find . -name "index.min.json" -exec dirname {} \; | head -1)
          echo "Repo dir: $REPO_DIR"
          cd "$REPO_DIR"
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b repo
          git add .
          git commit -m "Build: $(date +'%Y-%m-%d %H:%M')"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo
