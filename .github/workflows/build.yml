name: Build Extensions

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extensions
        run: ./gradlew make

      - name: Show manifest.json
        run: cat ShabakatyCinemana/build/intermediates/manifest.json

      - name: Prepare repo folder
        run: |
          mkdir -p repo/apk
          cp ShabakatyCinemana/build/ShabakatyCinemana.cs3 repo/apk/
          python3 -c "
          import json
          manifest = json.load(open('ShabakatyCinemana/build/intermediates/manifest.json'))
          manifest['apk'] = 'apk/ShabakatyCinemana.cs3'
          open('repo/index.min.json','w').write(json.dumps([manifest]))
          "
          cat repo/index.min.json

      - name: Push to repo branch
        run: |
          cd repo
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b repo
          git add .
          git commit -m "Build: $(date +'%Y-%m-%d %H:%M')"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo
